name: Deploy Jekyll site to Pages

on:
  # Lets you run this workflow manually from the Actions tab
  workflow_dispatch:

  # Automatically build and deploy when you push to your publishing branch
  push:
    branches:
      - master # Change to 'main' if your default branch is main

# Best practice: grant only the minimum permissions needed
permissions:
  contents: read      # required to read repository contents
  pages: write        # required to deploy to GitHub Pages
  id-token: write     # required for OIDC authentication during deployment

# Best practice: prevent overlapping deployments to the same Pages site
concurrency:
  group: "pages"
  cancel-in-progress: false
  # false = let the current deployment finish safely
  # instead of cancelling it halfway through

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Configure the Pages environment
      # This prepares metadata such as the correct base path for the site
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 3: Build the Jekyll site using the official Pages-compatible action
      # Best practice: use the official build action instead of manually managing
      # Ruby, Bundler, native extensions, and OS packages in your workflow
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1

      # Step 4: Upload the generated static site as an artifact
      # The deploy job will publish this artifact to GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    # Only run deploy after the build job completes successfully
    needs: build
    runs-on: ubuntu-latest

    # Best practice: use the built-in github-pages environment
    # so GitHub can track deployment history and expose the live URL
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Step 5: Deploy the uploaded artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
